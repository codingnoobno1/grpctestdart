name: socket_trace
description: A reusable Flutter package for tracing and debugging WebSocket and gRPC traffic.
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.10.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  vm_service: ^13.0.0
  devtools_shared:
    path: ../devtools/packages/devtools_shared
  args: ^2.4.2
  intl: ^0.19.0
  grpc: ^3.2.4

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
